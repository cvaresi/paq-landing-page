<!DOCTYPE html>
<html>
	<head>
		<title>three.js css3d - sprites</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link type="text/css" rel="stylesheet" href="main.css">
		<style>
			body {
				background-color: #fff;
				color: #000;
			}
			a {
				color: #48f;
			}
		</style>
	</head>
	<body>

		<div id="info"><a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> css3d - sprites</div>
		<div id="container"></div>

		<script type="importmap">
			{
				"imports": {
					"three": "https://unpkg.com/three@0.169.0/build/three.module.js",
					"three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';

			import TWEEN from 'three/addons/libs/tween.module.js';
			import { TrackballControls } from 'three/addons/controls/TrackballControls.js';
			import { CSS3DRenderer, CSS3DSprite } from 'three/addons/renderers/CSS3DRenderer.js';

			let camera, scene, renderer;
			//let controls;

			const particlesTotal = 512;
			const positions = [];
			const objects = [];
			let current = 0;

		

			init();
			animate();

			function init() {

				camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 1, 5000 );
				camera.position.set( 600, 400, 5000 );
				camera.lookAt( 0, 0, 0 );

				scene = new THREE.Scene();

				const spriteUrls = [
					'/sprites/sprite-magenta.png',
					'/sprites/sprite-black.png',
					'/sprites/sprite-pink.png',
					'/sprites/sprite-green.png'
				];
				const loadedImages = [];
				let loadedCount = 0;

				function tryCreateSprites() {
					if ( loadedCount !== spriteUrls.length ) return;
					for ( let i = 0; i < particlesTotal; i ++ ) {
						const img = loadedImages[ Math.floor( Math.random() * loadedImages.length ) ].cloneNode();
						const object = new CSS3DSprite( img );
						object.position.x = Math.random() * 4000 - 2000;
						object.position.y = Math.random() * 4000 - 2000;
						object.position.z = Math.random() * 4000 - 2000;
						scene.add( object );
						objects.push( object );
					}
					transition();
				}

				spriteUrls.forEach( function ( url ) {
					const image = document.createElement( 'img' );
					image.addEventListener( 'load', function () {
						loadedImages.push( image );
						loadedCount++;
						tryCreateSprites();
					} );
					image.src = url;
				} );

				// Plane

				const amountX = 16;
				const amountZ = 32;
				const separationPlane = 300;
				const offsetX = ( ( amountX - 1 ) * separationPlane ) / 2;
				const offsetZ = ( ( amountZ - 1 ) * separationPlane ) / 2;

				for ( let i = 0; i < particlesTotal; i ++ ) {

					const x = ( i % amountX ) * separationPlane;
					const z = Math.floor( i / amountX ) * separationPlane;
					const y = ( Math.sin( x * 0.5 ) + Math.sin( z * 0.5 ) ) * 200;

					positions.push( x - offsetX, y, z - offsetZ );

				}

				// Cube

				const amount = 8;
				const separationCube = 450;
				const offset = ( ( amount - 1 ) * separationCube ) / 2;

				for ( let i = 0; i < particlesTotal; i ++ ) {

					const x = ( i % amount ) * separationCube;
					const y = Math.floor( ( i / amount ) % amount ) * separationCube;
					const z = Math.floor( i / ( amount * amount ) ) * separationCube;

					positions.push( x - offset, y - offset, z - offset );

				}

				// LQ Letters (match reference: L = thick bars, Q = thick ring + center sphere + tail)

				const cellSize = 250;
				const letterGap = 3;

				// L: vertical bar 3 wide, full height; horizontal bar full width, 3 tall
				const lBarW = 3;
				const lBarH = 14;
				const lFootW = 8;
				const lFootH = 3;

				const lPoints = [];
				for ( let y = 0; y < lBarH; y ++ ) {
					for ( let x = 0; x < lBarW; x ++ ) {
						lPoints.push( { x, y } );
					}
				}
				for ( let y = lBarH; y < lBarH + lFootH; y ++ ) {
					for ( let x = 0; x < lFootW; x ++ ) {
						lPoints.push( { x, y } );
					}
				}

				// Q: thick ring (ellipse) + one center sphere + tail from lower-right
				const qRows = 16;
				const qCols = 16;
				const qcx = qCols / 2;
				const qcy = qRows / 2;
				const qOuterRx = 6.5;
				const qOuterRy = 7;
				const qInnerRx = 3.5;
				const qInnerRy = 4;

				const qPoints = [];
				for ( let gy = 0; gy < qRows; gy ++ ) {
					for ( let gx = 0; gx < qCols; gx ++ ) {
						const dx = gx - qcx;
						const dy = gy - qcy;
						const outerNorm = ( dx / qOuterRx ) * ( dx / qOuterRx ) + ( dy / qOuterRy ) * ( dy / qOuterRy );
						const innerNorm = ( dx / qInnerRx ) * ( dx / qInnerRx ) + ( dy / qInnerRy ) * ( dy / qInnerRy );
						const inRing = outerNorm <= 1.08 && innerNorm >= 0.92;
						if ( inRing ) qPoints.push( { x: gx, y: gy } );
					}
				}
				// Center sphere (single point in the Q hole)
				qPoints.push( { x: qcx, y: qcy } );
				// Tail: lower-right diagonal
				for ( let t = 0; t <= 8; t ++ ) {
					qPoints.push( { x: qcx + 4 + t, y: qcy + 5 + Math.floor( t * 0.8 ) } );
					if ( t > 0 && t < 8 ) qPoints.push( { x: qcx + 4 + t, y: qcy + 5 + Math.floor( t * 0.8 ) - 1 } );
				}

				// Offset Q to the right of L
				const lMaxX = lFootW - 1;
				const allPoints = [];
				for ( const p of lPoints ) {
					allPoints.push( { x: p.x, y: p.y } );
				}
				for ( const p of qPoints ) {
					allPoints.push( { x: p.x + lMaxX + letterGap, y: p.y } );
				}

				// Center combined shape and map to world (y flipped for screen-like up)
				let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
				for ( const p of allPoints ) {
					if ( p.x < minX ) minX = p.x;
					if ( p.x > maxX ) maxX = p.x;
					if ( p.y < minY ) minY = p.y;
					if ( p.y > maxY ) maxY = p.y;
				}
				const cenX = ( minX + maxX ) / 2;
				const cenY = ( minY + maxY ) / 2;

				const worldPoints = [];
				for ( const p of allPoints ) {
					worldPoints.push( {
						x: ( p.x - cenX ) * cellSize,
						y: - ( p.y - cenY ) * cellSize,
						z: 0
					} );
				}

				for ( let i = 0; i < particlesTotal; i ++ ) {
					if ( i < worldPoints.length ) {
						const p = worldPoints[ i ];
						positions.push( p.x, p.y, p.z );
					} else {
						const idx = i % worldPoints.length;
						const p = worldPoints[ idx ];
						positions.push(
							p.x + ( Math.random() - 0.5 ) * cellSize * 1,
							p.y + ( Math.random() - 0.5 ) * cellSize * 1,
							p.z + ( Math.random() - 0.5 ) * cellSize * 1
						);
					}
				}

				// Random

				for ( let i = 0; i < particlesTotal; i ++ ) {

					positions.push(
						Math.random() * 10000 - 5000,
						Math.random() * 10000 - 5000,
						Math.random() * 10000 - 5000
					);

				}

				// Sphere

				const radius = 2000;

				for ( let i = 0; i < particlesTotal; i ++ ) {

					const phi = Math.acos( - 1 + ( 2 * i ) / particlesTotal );
					const theta = Math.sqrt( particlesTotal * Math.PI ) * phi;

					positions.push(
						radius * Math.cos( theta ) * Math.sin( phi ),
						radius * Math.sin( theta ) * Math.sin( phi ),
						radius * Math.cos( phi )
					);

				}

				//

				renderer = new CSS3DRenderer();
				renderer.setSize( window.innerWidth, window.innerHeight );
				document.getElementById( 'container' ).appendChild( renderer.domElement );

				//

				//controls = new TrackballControls( camera, renderer.domElement );

				//

				window.addEventListener( 'resize', onWindowResize );

			}

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );

			}

			function transition() {

				const offset = current * particlesTotal * 3;
				const duration = 2000;

				for ( let i = 0, j = offset; i < particlesTotal; i ++, j += 3 ) {

					const object = objects[ i ];

					new TWEEN.Tween( object.position )
						.to( {
							x: positions[ j ],
							y: positions[ j + 1 ],
							z: positions[ j + 2 ]
						}, Math.random() * duration + duration )
						.easing( TWEEN.Easing.Exponential.InOut )
						.start();

				}

				new TWEEN.Tween( this )
					.to( {}, duration * 3 )
					.onComplete( transition )
					.start();

				current = ( current + 1 ) % 5;

			}

			function animate() {

				requestAnimationFrame( animate );

				TWEEN.update();
				//controls.update();

				const time = performance.now();

				for ( let i = 0, l = objects.length; i < l; i ++ ) {

					const object = objects[ i ];
					const scale = 1 + (parseInt(object.uuid.replace(/-/g,'').slice(0,8), 16) % 1001) / 1000;
					//const scale = Math.sin( ( Math.floor( object.position.x ) + time ) * 0.002 ) * 0.3 + 1;
					//const scale = 1;
					object.scale.set( scale, scale, scale );

				}

				renderer.render( scene, camera );

			}

		</script>
	</body>
</html>
