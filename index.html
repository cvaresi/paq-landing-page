<!DOCTYPE html>
<html>
	<head>
		<title>three.js css3d - sprites</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link type="text/css" rel="stylesheet" href="main.css">
		<link rel="stylesheet" href="https://use.typekit.net/ngr6nsw.css">
		<style>
			body {
				font-family: 'proxima-nova',sans-serif;
				background-color: #fff;
				color: #000;
				/*background-image: url('/img/hourglass.png');*/
				background-size: 720px;
				background-repeat: no-repeat;
				background-position: 50% 25px;
			}
			a {
				color: #48f;
			}

			p {
				font-family: 'proxima-nova', sans-serif;
				font-weight: 400;
				font-style: normal;
			}

			h1, h2, h3, h4, strong {
				font-family: 'proxima-nova', sans-serif;
				font-weight: 800;
				font-style: normal;
			}

			.info {
				font-family: 'proxima-nova-condensed', sans-serif;
				font-weight: 600;
				font-style: normal;
			}

			.persona {
				font-family: 'proxima-nova-extra-condensed', sans-serif;
				font-weight: 700;
				font-style: normal;
			}

			/* Formation overlay — style freely; sits above the WebGL/CSS3D canvas */
			.formation-overlay {
				position: fixed;
				inset: 0;
				z-index: 10;
				pointer-events: none;
				display: flex;
				flex-direction: column;
				justify-content: space-between;
				padding: clamp(1rem, 4vw, 2.5rem);
				box-sizing: border-box;
			}

			.formation-overlay__inner {
				pointer-events: none;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 1.5rem;
				width: 100%;
				max-width: 42rem;
				margin: 0 auto;
			}

			.formation-copy {
				pointer-events: auto;
				text-align: center;
				opacity: 0;
				visibility: hidden;
				transition: opacity 0.45s ease, visibility 0.45s ease;
			}

			.formation-copy.formation-copy--visible {
				opacity: 1;
				visibility: visible;
			}

			.formation-copy__title {
				margin: 0 0 0.5rem;
				font-size: clamp(1.5rem, 4vw, 2.25rem);
				font-weight: 700;
				letter-spacing: -0.02em;
				line-height: 1.2;
			}

			.formation-copy__body {
				margin: 0;
				font-size: clamp(1rem, 2.2vw, 1.125rem);
				line-height: 1.55;
				color: #333;
			}

			.formation-nav {
				pointer-events: auto;
				display: flex;
				flex-wrap: wrap;
				gap: 0.75rem;
				justify-content: center;
				margin-top: auto;
			}

			.formation-nav__btn {
				cursor: pointer;
				font: inherit;
				padding: 0.55rem 1.25rem;
				border-radius: 999px;
				border: 2px solid #111;
				background: rgba(255, 255, 255, 0.92);
				color: #111;
				/*transition: background 0.2s ease, color 0.2s ease, opacity 0.2s ease;*/
			}

			.formation-nav__btn:hover:not(:disabled) {
				background: #111;
				color: #fff;
			}

			.formation-nav__btn:disabled {
				opacity: 0.35;
				cursor: not-allowed;
			}

			.formation-nav__btn--restart {
				border-color: #0a6;
				color: #063;
			}

			.formation-nav__btn--restart:hover:not(:disabled) {
				background: #063;
				color: #fff;
			}
		</style>
	</head>
	<body>
		<div id="container"></div>

		<div id="formation-overlay" class="formation-overlay" aria-label="Formation information">
			<div class="formation-overlay__inner">
				<div id="formation-copy" class="formation-copy" aria-live="polite" aria-atomic="true">
					<h1 id="formation-title" class="formation-copy__title"></h1>
					<p id="formation-body" class="formation-copy__body"></p>
				</div>
				<nav class="formation-nav" aria-label="Formation navigation">
					<button type="button" id="formation-back" class="formation-nav__btn">Back</button>
					<button type="button" id="formation-next" class="formation-nav__btn">Next</button>
					<button type="button" id="formation-restart" class="formation-nav__btn formation-nav__btn--restart" hidden>Restart</button>
				</nav>
			</div>
		</div>

		<script type="importmap">
			{
				"imports": {
					"three": "https://unpkg.com/three@0.169.0/build/three.module.js",
					"three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';

			import TWEEN from 'three/addons/libs/tween.module.js';
			import { TrackballControls } from 'three/addons/controls/TrackballControls.js';
			import { CSS3DRenderer, CSS3DSprite } from 'three/addons/renderers/CSS3DRenderer.js';

			let camera, scene, renderer;
			let controls;

			const particlesTotal = 500;
			const objects = [];
			const formations = [];
			let applyFormationRef = null;
			let formationsRef = null;

			const FORMATION_TWEEN_DURATION_MS = 2000;
			/** Max position/scale tween length matches applyFormation: duration + random * duration */
			const FORMATION_ANIM_COMPLETE_MS = FORMATION_TWEEN_DURATION_MS * 2;
			/** Time copy stays visible before auto-advancing (only while auto-play is on) */
			const FORMATION_AUTO_HOLD_MS = FORMATION_TWEEN_DURATION_MS * 3;

			let displayedFormationIndex = 0;
			let formationCopyRevealTimer = null;
			let formationAutoAdvanceTimer = null;
			/** When false, formations only change via buttons (stopped by Next / Back) */
			let formationAutoPlayActive = true;

			/** One entry per formation, same order as addFormation calls */
			const formationCopy = [
				{
					title: 'Four voices',
					body: 'Every sprite starts as part of a simple line—four colors, one idea. This is where the story begins.'
				},
				{
					title: 'LQ',
					body: 'How we raise your <strong>Launch Quotient</strong>'
				},
				{
					title: 'Equalizer',
					body: 'Rhythm and data meet in vertical stacks—like sound turned spatial, alive and reactive.'
				},
				{
					title: 'Bloom',
					body: 'Petals, stem, and leaves emerge from color and placement—a rose built from light and glassy spheres.'
				},
				{
					title: 'People',
					body: 'Figures and silhouettes suggest collaboration—many points becoming something human.'
				},
				{
					title: 'Workstreams',
					body: 'Flows and connections between nodes—how work moves when everything is linked.'
				},
				{
					title: 'Hourglass',
					body: 'Time, focus, and transformation—grains and structure in a single form. You\'ve reached the end.'
				}
			];

			function clearFormationCopyTimer() {
				if ( formationCopyRevealTimer != null ) {
					clearTimeout( formationCopyRevealTimer );
					formationCopyRevealTimer = null;
				}
			}

			function clearFormationAutoAdvanceTimer() {
				if ( formationAutoAdvanceTimer != null ) {
					clearTimeout( formationAutoAdvanceTimer );
					formationAutoAdvanceTimer = null;
				}
			}

			function stopFormationAutoPlay() {
				formationAutoPlayActive = false;
				clearFormationAutoAdvanceTimer();
			}

			function scheduleFormationAutoAdvance() {
				clearFormationAutoAdvanceTimer();
				if ( ! formationAutoPlayActive ) return;
				const list = formationsRef ?? formations;
				if ( displayedFormationIndex >= list.length - 1 ) return;

				formationAutoAdvanceTimer = setTimeout( () => {
					formationAutoAdvanceTimer = null;
					if ( ! formationAutoPlayActive ) return;
					const L = formationsRef ?? formations;
					if ( displayedFormationIndex >= L.length - 1 ) return;
					goToFormation( displayedFormationIndex + 1 );
				}, FORMATION_AUTO_HOLD_MS );
			}

			function setFormationCopyVisible( visible ) {
				const el = document.getElementById( 'formation-copy' );
				if ( ! el ) return;
				el.classList.toggle( 'formation-copy--visible', visible );
				el.setAttribute( 'aria-hidden', visible ? 'false' : 'true' );
			}

			function updateFormationCopyContent( index ) {
				const copy = formationCopy[ index ] ?? { title: '', body: '' };
				const titleEl = document.getElementById( 'formation-title' );
				const bodyEl = document.getElementById( 'formation-body' );

				if ( titleEl ) titleEl.innerHTML = copy.title;
				if ( bodyEl ) bodyEl.innerHTML = copy.body;
			}

			function updateFormationNavButtons() {
				const list = formationsRef ?? formations;
				const n = list.length;
				const backBtn = document.getElementById( 'formation-back' );
				const nextBtn = document.getElementById( 'formation-next' );
				const restartBtn = document.getElementById( 'formation-restart' );
				const idx = displayedFormationIndex;
				if ( backBtn ) backBtn.disabled = idx <= 0;
				if ( nextBtn ) {
					nextBtn.hidden = idx >= n - 1;
					nextBtn.disabled = idx >= n - 1;
				}
				if ( restartBtn ) restartBtn.hidden = idx < n - 1;
			}

			function goToFormation( index ) {
				const list = formationsRef ?? formations;
				if ( list.length === 0 ) return;
				const n = list.length;
				const idx = ( ( index % n ) + n ) % n;

				clearFormationCopyTimer();
				clearFormationAutoAdvanceTimer();
				if ( typeof TWEEN.removeAll === 'function' ) TWEEN.removeAll();

				displayedFormationIndex = idx;
				setFormationCopyVisible( false );
				updateFormationCopyContent( idx );
				updateFormationNavButtons();

				const formation = list[ idx ];
				const applyFn = applyFormationRef;
				if ( applyFn ) applyFn( formation, { duration: FORMATION_TWEEN_DURATION_MS } );

				formationCopyRevealTimer = setTimeout( () => {
					formationCopyRevealTimer = null;
					setFormationCopyVisible( true );
					updateFormationNavButtons();
					scheduleFormationAutoAdvance();
				}, FORMATION_ANIM_COMPLETE_MS );
			}

			function setupFormationUI() {
				const backBtn = document.getElementById( 'formation-back' );
				const nextBtn = document.getElementById( 'formation-next' );
				const restartBtn = document.getElementById( 'formation-restart' );
				if ( backBtn && ! backBtn.dataset.wired ) {
					backBtn.dataset.wired = '1';
					backBtn.addEventListener( 'click', () => {
						stopFormationAutoPlay();
						if ( displayedFormationIndex > 0 ) goToFormation( displayedFormationIndex - 1 );
					} );
				}
				if ( nextBtn && ! nextBtn.dataset.wired ) {
					nextBtn.dataset.wired = '1';
					nextBtn.addEventListener( 'click', () => {
						stopFormationAutoPlay();
						const list = formationsRef ?? formations;
						if ( displayedFormationIndex < list.length - 1 ) goToFormation( displayedFormationIndex + 1 );
					} );
				}
				if ( restartBtn && ! restartBtn.dataset.wired ) {
					restartBtn.dataset.wired = '1';
					restartBtn.addEventListener( 'click', () => goToFormation( 0 ) );
				}
			}

			init();
			animate();

			function init() {

				camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 1, 5000 );
				camera.position.set( 0, 0, 5000 );
				camera.lookAt( 0, 0, 0 );

				scene = new THREE.Scene();

				const spriteUrls = [
					'/sprites/sprite-magenta.png',
					'/sprites/sprite-black.png',
					'/sprites/sprite-pink.png',
					'/sprites/sprite-green.png'
				];
				const loadedImages = [];
				let loadedCount = 0;

				const spriteIndexByColor = {
					magenta: 0,
					black: 1,
					pink: 2,
					green: 3
				};

				function resolveSpriteIndex( color ) {
					if ( typeof color === 'number' ) return color;
					if ( typeof color !== 'string' ) return spriteIndexByColor.magenta;
					const key = color.trim().toLowerCase();
					return ( key in spriteIndexByColor ) ? spriteIndexByColor[ key ] : spriteIndexByColor.magenta;
				}

				function tweenSpriteVisibility( object, visible, duration ) {
					if ( object.userData.visibilityTween ) object.userData.visibilityTween.stop();

					const startOpacity = ( object.userData.currentOpacity != null )
						? object.userData.currentOpacity
						: Number.parseFloat( object.element.style.opacity || '1' );
					const proxy = { opacity: Number.isFinite( startOpacity ) ? startOpacity : 1 };
					const targetOpacity = visible ? 1 : 0;

					if ( visible ) {
						object.visible = true;
						object.element.style.display = '';
					}

					object.userData.visibilityTarget = visible;
					object.userData.visibilityTween = new TWEEN.Tween( proxy )
						.to( { opacity: targetOpacity }, duration * 0.7 )
						.easing( TWEEN.Easing.Exponential.InOut )
						.onUpdate( () => {
							object.userData.currentOpacity = proxy.opacity;
							object.element.style.opacity = String( proxy.opacity );
						} )
						.onComplete( () => {
							object.userData.currentOpacity = targetOpacity;
							object.element.style.opacity = String( targetOpacity );
							if ( ! visible ) {
								object.visible = false;
								object.element.style.display = 'none';
							}
						} )
						.start();
				}

				function setSpriteAppearance( object, spec, duration ) {
					const visible = spec?.visible !== false;

					if ( object.userData.visibilityTarget !== visible ) {
						tweenSpriteVisibility( object, visible, duration );
					}

					if ( spec?.color != null ) {
						const spriteIndex = resolveSpriteIndex( spec.color );
						const src = loadedImages[ spriteIndex ]?.src;
						if ( src && object.element.src !== src ) object.element.src = src;
					}

					if ( spec?.scale != null ) object.userData.targetScale = spec.scale;
				}

				function makeFormationBuilder( name ) {
					const specs = Array.from( { length: particlesTotal }, () => ( { visible: false } ) );
					let visibleCount = 0;
					let autoIndex = 0;

					function applyDefaultVisible() {
						for ( let i = 0; i < particlesTotal; i ++ ) {
							specs[ i ].visible = i < visibleCount;
						}
					}

					return {
						name,
						count( n ) {
							visibleCount = Math.max( 0, Math.min( particlesTotal, Math.floor( n ) ) );
							applyDefaultVisible();
							autoIndex = 0;
							return this;
						},
						sprite( index, spec ) {
							const i = Math.max( 0, Math.min( particlesTotal - 1, Math.floor( index ) ) );
							specs[ i ] = { ...specs[ i ], ...spec, visible: spec?.visible ?? specs[ i ].visible ?? true };
							return this;
						},
						place( spec ) {
							while ( autoIndex < particlesTotal && specs[ autoIndex ]?.visible === false && autoIndex < visibleCount ) autoIndex++;
							const i = Math.min( particlesTotal - 1, autoIndex++ );
							specs[ i ] = { ...specs[ i ], ...spec, visible: spec?.visible ?? ( i < visibleCount ) };
							return this;
						},
						sprites( list ) {
							for ( const spec of list ) this.place( spec );
							return this;
						},
						build() {
							applyDefaultVisible();
							return { name, specs };
						}
					};
				}

				function addFormation( name, buildFn ) {
					const b = makeFormationBuilder( name );
					buildFn( b );
					formations.push( b.build() );
				}

				function applyFormation( formation, { duration = 2000 } = {} ) {
					const specs = formation.specs;
					for ( let i = 0; i < particlesTotal; i ++ ) {
						const object = objects[ i ];
						const spec = specs[ i ] ?? { visible: false };

						setSpriteAppearance( object, spec, duration );

						const toPos = {
							x: spec?.x ?? object.position.x,
							y: spec?.y ?? object.position.y,
							z: spec?.z ?? object.position.z
						};

						new TWEEN.Tween( object.position )
							.to( toPos, Math.random() * duration + duration )
							.easing( TWEEN.Easing.Exponential.InOut )
							.start();

						const targetScale = ( spec?.scale != null ? spec.scale : ( object.userData.targetScale ?? 1 ) );
						new TWEEN.Tween( object.scale )
							.to( { x: targetScale, y: targetScale, z: targetScale }, Math.random() * duration + duration )
							.easing( TWEEN.Easing.Exponential.InOut )
							.start();
					}
				}

				applyFormationRef = applyFormation;
				formationsRef = formations;

				function tryCreateSprites() {
					if ( loadedCount !== spriteUrls.length ) return;
					for ( let i = 0; i < particlesTotal; i ++ ) {
						const img = loadedImages[ 0 ].cloneNode();
						const object = new CSS3DSprite( img );
						object.userData.targetScale = 1;
						object.userData.currentOpacity = 1;
						object.userData.visibilityTarget = true;
						object.element.style.opacity = '1';
						object.position.x = Math.random() * 4000 - 2000;
						object.position.y = Math.random() * 4000 - 2000;
						object.position.z = Math.random() * 4000 - 2000;
						scene.add( object );
						objects.push( object );
					}

					

					addFormation('intro', (f) => {
					// Indicate the number of sprites
						f.count(4);
						// individually place + set color + set scale - 4 spheres
						f.sprite(0, { x: -900, y:  0, z: 1000, color: 'magenta', scale: 1.0, visible: true });
						f.sprite(1, { x: -300, y:  0, z: 1000, color: 'black', scale: 1.0, visible: true });
						f.sprite(2, { x: 300, y:  0, z: 1000, color: 'pink', scale: 1.0, visible: true });
						f.sprite(3, { x: 900, y:  0, z: 1000, color: 'green', scale: 1.0, visible: true });
						
					});
					

					addFormation('LQ', (f) => {
					// Indicate the number of sprites
						f.count(134);
						// individually place + set color + set scale - Letter "L"
						f.sprite(0, { x: -2000, y:  2200, z: 1000, color: 'magenta', scale: 1.6, visible: true });
						f.sprite(1, { x: -1850, y:  1900, z: 800, color: 'black', scale: 0.8, visible: true });
						f.sprite(2, { x: -2300, y:  1900, z: 800, color: 'black', scale: 0.8, visible: true });
						f.sprite(3, { x: -1900, y:  1700, z: 1000, color: 'magenta', scale: 0.9, visible: true });
						f.sprite(4, { x: -2300, y:  1600, z: 900, color: 'green', scale: 0.6, visible: true });
						f.sprite(5, { x: -2200, y:  1500, z: 800, color: 'green', scale: 0.7, visible: true });
						f.sprite(6, { x: -1800, y:  1450, z: 900, color: 'pink', scale: 0.8, visible: true });
						f.sprite(7, { x: -1750, y:  1400, z: 1000, color: 'black', scale: 0.9, visible: true });
						f.sprite(8, { x: -2200, y:  1350, z: 1000, color: 'pink', scale: 0.7, visible: true });
						f.sprite(9, { x: -2200, y:  1100, z: 900, color: 'magenta', scale: 0.9, visible: true });
						f.sprite(10, { x: -1850, y:  1200, z: 800, color: 'magenta', scale: 0.7, visible: true });
						f.sprite(11, { x: -1750, y:  950, z: 1000, color: 'pink', scale: 0.8, visible: true });
						f.sprite(12, { x: -2200, y:  800, z: 1000, color: 'pink', scale: 0.8, visible: true });
						f.sprite(13, { x: -1850, y:  700, z: 900, color: 'green', scale: 0.9, visible: true });
						f.sprite(14, { x: -2200, y:  550, z: 800, color: 'black', scale: 0.8, visible: true });
						f.sprite(15, { x: -1750, y:  500, z: 1000, color: 'black', scale: 0.6, visible: true });
						f.sprite(16, { x: -2200, y:  400, z: 900, color: 'green', scale: 0.6, visible: true });
						f.sprite(17, { x: -1900, y:  200, z: 1000, color: 'pink', scale: 0.7, visible: true });
						f.sprite(18, { x: -1750, y:  200, z: 800, color: 'pink', scale: 0.6, visible: true });
						f.sprite(19, { x: -2200, y:  100, z: 800, color: 'magenta', scale: 0.7, visible: true });
						f.sprite(20, { x: -1750, y:  -150, z: 800, color: 'magenta', scale: 0.7, visible: true });
						f.sprite(21, { x: -2200, y:  -150, z: 900, color: 'magenta', scale: 0.8, visible: true });
						f.sprite(22, { x: -2000, y:  -250, z: 700, color: 'green', scale: 0.7, visible: true });
						f.sprite(23, { x: -1800, y:  -350, z: 1000, color: 'black', scale: 0.6, visible: true });
						f.sprite(24, { x: -2250, y:  -550, z: 900, color: 'black', scale: 0.6, visible: true });
						f.sprite(25, { x: -1750, y:  -500, z: 800, color: 'magenta', scale: 0.7, visible: true });
						f.sprite(26, { x: -2100, y:  -500, z: 700, color: 'pink', scale: 0.6, visible: true });
						f.sprite(27, { x: -1750, y:  -650, z: 1000, color: 'green', scale: 0.5, visible: true });
						f.sprite(28, { x: -2150, y:  -850, z: 900, color: 'pink', scale: 1.1, visible: true });
						f.sprite(29, { x: -1600, y:  -600, z: 800, color: 'black', scale: 0.9, visible: true });
						f.sprite(30, { x: -1600, y:  -900, z: 1000, color: 'green', scale: 0.7, visible: true });
						f.sprite(31, { x: -1500, y:  -700, z: 900, color: 'magenta', scale: 0.5, visible: true });
						f.sprite(32, { x: -1350, y:  -1000, z: 800, color: 'black', scale: 0.6, visible: true });
						f.sprite(33, { x: -1300, y:  -550, z: 700, color: 'pink', scale: 0.5, visible: true });
						f.sprite(34, { x: -1150, y:  -800, z: 1000, color: 'pink', scale: 0.9, visible: true });
						f.sprite(35, { x: -1100, y:  -1050, z: 800, color: 'pink', scale: 0.3, visible: true });
						f.sprite(36, { x: -900, y:  -1000, z: 900, color: 'magenta', scale: 0.5, visible: true });
						f.sprite(37, { x: -900, y:  -550, z: 900, color: 'black', scale: 0.6, visible: true });
						f.sprite(38, { x: -800, y:  -800, z: 800, color: 'green', scale: 0.7, visible: true });
						f.sprite(39, { x: -500, y:  -800, z: 1000, color: 'magenta', scale: 1.4, visible: true });

						// Letter "Q"
						f.sprite(40, { x: -400, y:  750, z: 1000, color: 'pink', scale: 0.6, visible: true });
						f.sprite(41, { x: -400, y:  950, z: 800, color: 'magenta', scale: 0.6, visible: true });
						f.sprite(42, { x: -100, y:  900, z: 1000, color: 'magenta', scale: 0.6, visible: true });
						f.sprite(43, { x: -400, y:  1100, z: 1000, color: 'black', scale: 0.7, visible: true });

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );

			}

			function animate() {

				requestAnimationFrame( animate );

				TWEEN.update();
				controls.update();

				const time = performance.now();
				const amp = 0.5;              // how far up/down on Y
				const speed = 0.0015;      // how fast the Y changes

				for ( let i = 0, l = objects.length; i < l; i ++ ) {

					const object = objects[ i ];
					// Kinda cool pulsating effect from the original example
					// const scale = Math.sin( ( Math.floor( object.position.x ) + time ) * 0.002 ) * -0.1 + 1;
					// object.scale.set( scale, scale, scale )
					// Hover effect on Y axis
					object.position.y += Math.sin( time * speed + i * 0.35 ) * amp;
					void time;

				}

				renderer.render( scene, camera );

			}
